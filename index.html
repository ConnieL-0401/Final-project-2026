<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Wood Knowledge Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Wood Knowledge Quiz</h1>

<form id="quizForm">
    <p>1. Which type of wood is commonly used for making furniture?</p>
    <label><input type="radio" name="q1" value="Oak"> Oak</label><br>
    <label><input type="radio" name="q1" value="Balsa"> Balsa</label><br>
    <label><input type="radio" name="q1" value="Pine"> Pine</label><br><br>

    <p>2. Which wood is the lightest in weight?</p>
    <label><input type="radio" name="q2" value="Balsa"> Balsa</label><br>
    <label><input type="radio" name="q2" value="Teak"> Teak</label><br>
    <label><input type="radio" name="q2" value="Mahogany"> Mahogany</label><br><br>

    <p>3. Which wood is naturally resistant to water?</p>
    <label><input type="radio" name="q3" value="Teak"> Teak</label><br>
    <label><input type="radio" name="q3" value="Maple"> Maple</label><br>
    <label><input type="radio" name="q3" value="Birch"> Birch</label><br><br>

    <p>4. Which part of the tree produces new wood growth?</p>
    <label><input type="radio" name="q4" value="Cambium"> Cambium</label><br>
    <label><input type="radio" name="q4" value="Heartwood"> Heartwood</label><br>
    <label><input type="radio" name="q4" value="Sapwood"> Sapwood</label><br><br>

    <p>5. Which wood is known for its reddish-brown color?</p>
    <label><input type="radio" name="q5" value="Mahogany"> Mahogany</label><br>
    <label><input type="radio" name="q5" value="Ash"> Ash</label><br>
    <label><input type="radio" name="q5" value="Cedar"> Cedar</label><br><br>

    <button type="button" id="submitBtn">Submit Quiz</button>
</form>

<div id="result"></div>

<img id="explosion" 
     src="https://upload.wikimedia.org/wikipedia/commons/5/5f/Explosion-155624_1280.png"
     alt="Explosion">

<script src="script.js"></script>
</body>
</html>
