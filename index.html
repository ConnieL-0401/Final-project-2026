<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room Quiz Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-container">
        <h1>Room Quiz Challenge</h1>

        <div id="room-number">Room 1</div>

        <div id="question-box">
            <p id="question-text"></p>
        </div>

        <div id="choices"></div>

        <div class="buttons">
            <button id="hint-btn">Hint</button>
            <button id="reveal-btn">Reveal Answer</button>
        </div>

        <p id="hint-text"></p>
        <p id="reveal-text"></p>

        <p id="feedback"></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
